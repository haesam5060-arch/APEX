<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX · 일별손익</title>
  <style>
    :root {
      --bg: #09090d;
      --bg2: #0a0e12;
      --card: #0d1419;
      --card2: #121c22;
      --border: #1a2a35;
      --border2: #153045;
      --text: #e8e8ec;
      --dim: #9a9aa5;
      --dim2: #5a5a65;
      --accent: #22d3ee;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow-x: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, 'SF Pro Display', 'Pretendard', system-ui, sans-serif;
      font-size: 13px; -webkit-font-smoothing: antialiased;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* 헤더 */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: linear-gradient(180deg, #071018 0%, #050c14 100%);
      border-bottom: 1px solid var(--border2);
      gap: 16px; box-shadow: var(--shadow);
      position: sticky; top: 0; z-index: 40;
    }
    .header-left { display: flex; align-items: center; gap: 20px; min-width: 0; flex: 1 1 auto; }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand-name { font-weight: 800; font-size: 19px; letter-spacing: -0.5px; color: var(--accent); }
    .brand-sub {
      font-weight: 500; font-size: 11px; color: var(--dim);
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .brand-sub::before {
      content: ''; display: inline-block; width: 1px; height: 11px;
      background: var(--border2); margin-right: 10px; vertical-align: -1px;
    }
    .nav-tabs {
      display: flex; gap: 2px; background: rgba(0,0,0,0.3);
      padding: 3px; border-radius: 8px; border: 1px solid var(--border);
    }
    .nav-tab {
      padding: 6px 12px; border: none; border-radius: 6px;
      background: transparent; color: var(--dim);
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .nav-tab .nav-ico { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.55; transition: opacity 0.15s; }
    .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-tab:hover .nav-ico { opacity: 0.9; }
    .nav-tab.active {
      background: rgba(34,211,238,0.12); color: var(--accent);
      border: 1px solid rgba(34,211,238,0.25); padding: 5px 11px;
    }
    .nav-tab.active .nav-ico { opacity: 1; }
    .nav-tab .nav-live {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      flex-shrink: 0; animation: blink 1.3s ease-in-out infinite; margin-left: 2px;
    }
    .nav-tab:not(.active) .nav-live { display: none; }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .auto-status {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-radius: 999px;
      font-size: 11.5px; font-weight: 600;
      color: var(--accent); border: 1px solid rgba(34,211,238,0.4);
      background: rgba(34,211,238,0.1);
    }
    .auto-status strong { font-weight: 800; color: #fff; }
    .auto-status .live {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
      animation: blink 1.3s ease-in-out infinite;
    }
    .clock {
      font-family: 'SF Mono', monospace; font-size: 11.5px;
      color: var(--dim); padding: 6px 10px;
      background: rgba(0,0,0,0.3); border-radius: 6px;
      border: 1px solid var(--border); letter-spacing: 0.3px;
    }
    .clock .date { color: var(--dim2); margin-right: 6px; }
    .clock .sec { color: var(--accent); }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      color: var(--dim); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: all 0.15s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); }

    /* 컨테이너 */
    .container { padding: 20px; max-width: 980px; margin: 0 auto; }

    /* 히어로 카드 */
    .hero-row {
      display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: 10px; margin-bottom: 14px;
    }
    .hero {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 20px;
      position: relative; overflow: hidden;
    }
    .hero.primary {
      background: linear-gradient(135deg, #071018 0%, #0a1822 50%, #071018 100%);
      border-color: rgba(34,211,238,0.25);
    }
    .hero-label {
      font-size: 11px; color: var(--dim); font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px;
    }
    .hero-value {
      font-size: 32px; font-weight: 800; line-height: 1;
      letter-spacing: -1px;
      font-family: 'SF Mono', monospace; font-variant-numeric: tabular-nums;
    }
    .hero-value.pos { color: var(--green); }
    .hero-value.neg { color: var(--accent); }
    .hero-value.warn { color: var(--yellow); }
    .hero-sub {
      font-size: 11.5px; color: var(--dim); margin-top: 8px;
      display: flex; gap: 10px; align-items: center;
    }
    .hero-sub .sep { color: var(--dim2); opacity: 0.4; }
    .hero-sub strong { color: var(--text); font-weight: 700; }

    /* 누적 지표 스트립 */
    .stat-strip {
      display: grid; grid-template-columns: repeat(8, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; margin-bottom: 14px;
    }
    .stat {
      background: var(--bg2); padding: 10px 14px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stat-value { font-size: 14px; font-weight: 700; font-family: 'SF Mono', monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.2px; line-height: 1.2; }
    .stat-value.pos { color: var(--green); }
    .stat-value.neg { color: var(--accent); }
    .stat-value.warn { color: var(--yellow); }
    .stat-sub { font-size: 10px; color: var(--dim2); white-space: nowrap; }

    /* 패널 */
    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    }
    .panel-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .panel-title .live-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: blink 1.3s ease-in-out infinite;
    }
    .panel-title .count {
      font-size: 11px; color: var(--dim); font-weight: 500;
      background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 999px;
    }
    .panel-meta { font-size: 11px; color: var(--dim); }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--bg2); padding: 10px 14px; text-align: left;
      color: var(--dim); font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      border-bottom: 1px solid var(--border); white-space: nowrap;
      vertical-align: middle;
    }
    thead th.num { text-align: right; }
    tbody td {
      padding: 11px 14px; font-size: 12.5px;
      border-bottom: 1px solid rgba(26,42,53,0.5); white-space: nowrap;
      font-family: 'SF Mono', monospace; font-variant-numeric: tabular-nums;
      vertical-align: middle;
    }
    tbody td.stock-name { font-family: 'Inter', sans-serif; font-weight: 600; }
    tbody tr { transition: background 0.1s; cursor: pointer; }
    tbody tr:hover { background: rgba(34,211,238,0.04); }
    tbody tr:last-child td { border-bottom: none; }
    .num { text-align: right; }
    .pos, .pnl-pos { color: var(--green); font-weight: 600; }
    .neg, .pnl-neg { color: var(--accent); font-weight: 600; }
    .dim { color: var(--dim); }
    .dim2 { color: var(--dim2); }

    /* 컬럼 폭 */
    table thead tr th:nth-child(1) { width: 13%; }
    table thead tr th:nth-child(2) { width: 9%; text-align: right; }
    table thead tr th:nth-child(3) { width: 18%; text-align: right; }
    table thead tr th:nth-child(4) { width: 18%; text-align: right; }
    table thead tr th:nth-child(5) { width: 14%; text-align: right; }
    table thead tr th:nth-child(6) { width: 18%; text-align: right; }
    tbody tr.pnl-row td:nth-child(2),
    tbody tr.pnl-row td:nth-child(3),
    tbody tr.pnl-row td:nth-child(4),
    tbody tr.pnl-row td:nth-child(5),
    tbody tr.pnl-row td:nth-child(6) { text-align: right; }
    tbody tr.pnl-row td:first-child { font-family: 'Inter', sans-serif; font-weight: 600; letter-spacing: -0.2px; }

    /* 배지 */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 5px;
      font-size: 10px; font-weight: 700; font-family: 'Inter', sans-serif;
    }
    .badge-overnight { background: rgba(34,211,238,0.12); color: var(--accent); border: 1px solid rgba(34,211,238,0.2); }
    .badge-stopLoss { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .badge-manual { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }

    /* 상세 행 */
    .daily-detail-row { background: rgba(34,211,238,0.02); }

    /* 모바일 */
    @media (max-width: 1100px) {
      .hero-row { grid-template-columns: 1fr 1fr; }
      .stat-strip { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
      .header { padding: 10px 14px; flex-wrap: wrap; }
      .header-left { flex-wrap: wrap; gap: 10px 16px; width: 100%; }
      .nav-tabs { order: 3; flex-basis: 100%; width: 100%; overflow-x: auto; }
      .nav-tab { flex: 1; font-size: 11.5px; padding: 6px 10px; }
      .nav-tab.active { padding: 5px 9px; }
      .hero-row { grid-template-columns: 1fr; }
      .stat-strip { grid-template-columns: repeat(2, 1fr); }
      .hero-value { font-size: 24px; }
      .container { padding: 10px; }
      .brand-sub { display: none; }
      .clock { font-size: 11px; padding: 5px 8px; }
      .clock .date { display: none; }
      thead th { font-size: 9.5px; padding: 7px 8px; }
      tbody td { font-size: 11px; padding: 8px 8px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="brand">
      <span class="brand-name">APEX</span>
      <span class="brand-sub">모닝 클러스터 오버나잇 엔진</span>
    </div>
    <nav class="nav-tabs">
      <a class="nav-tab" href="index.html">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.5"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 3" opacity="0.6"/></svg>
        모니터링
        <span class="nav-live"></span>
      </a>
      <a class="nav-tab active" href="stats.html">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20h18"/><path d="M6 20v-5M11 20V9M16 20v-7"/></svg>
        일별손익
      </a>
      <a class="nav-tab" href="engine.html">
        <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1L7 17M17 7l2.1-2.1"/></svg>
        엔진설명
      </a>
    </nav>
  </div>
  <div class="header-right">
    <div id="autoStatusBadge" class="auto-status"><span class="live"></span>모드 <strong id="modeLabel">--</strong></div>
    <div class="clock"><span class="date">--</span>--:--<span class="sec">:--</span></div>
    <button class="icon-btn" title="알림">🔔</button>
    <button class="icon-btn" title="설정" onclick="location.href='index.html'">⚙</button>
  </div>
</header>

<div class="container">

  <!-- 일별 손익 패널 -->
  <section class="panel">
    <div class="panel-header">
      <div class="panel-title">
        <span class="live-dot"></span>
        일별손익
        <span class="count">최근 30일</span>
      </div>
      <span class="panel-meta">T+1 09:01 매도 기준 · 오버나잇 전략 결과</span>
    </div>
    <div id="dailyPnlBreakdown" style="font-size:12px;display:flex;gap:16px;flex-wrap:wrap;padding:8px 16px 10px;border-bottom:1px solid var(--border);"></div>
    <table>
      <thead>
        <tr>
          <th>날짜</th>
          <th class="num">종목수</th>
          <th class="num">매수금액</th>
          <th class="num">손익</th>
          <th class="num">수익률</th>
          <th class="num">누적</th>
        </tr>
      </thead>
      <tbody id="pnlTable">
        <tr><td colspan="6" style="padding:20px;text-align:center;color:var(--dim);font-size:12px;">로딩 중...</td></tr>
      </tbody>
    </table>
  </section>

</div>

<script>
  // ── 공통 유틸 ──────────────────────────────────────
  async function api(path, opts = {}) {
    try {
      const r = await fetch(path, { credentials: 'same-origin', ...opts });
      if (r.status === 401 || r.redirected) { location.href = '/login'; return null; }
      return await r.json();
    } catch (e) { return null; }
  }

  function fmtTradeMD(dateStr) {
    if (!dateStr) return '-';
    const m = String(dateStr).match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return '-';
    return `${parseInt(m[2], 10)}/${parseInt(m[3], 10)}`;
  }

  // 시계
  function updateClock() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const MM = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    const el = document.querySelector('.clock');
    if (el) el.innerHTML = `<span class="date">${yyyy}-${MM}-${dd}</span>${hh}:${mm}<span class="sec">:${ss}</span>`;
  }
  updateClock(); setInterval(updateClock, 1000);

  // ── 일별 손익 렌더링 ────────────────────────────────
  let _openDetailDate = null;
  let _cachedScanLog = [];

  async function refreshDailyPnl() {
    const data = await api('/api/status');
    if (!data) return;
    _cachedScanLog = data.scanLog || data.scan_log || [];

    // 헤더 모드 배지
    const mode = data.mode || data.tradingMode || '--';
    const modeEl = document.getElementById('modeLabel');
    if (modeEl) modeEl.textContent = mode;
    const badge = document.getElementById('autoStatusBadge');
    if (badge) {
      if (mode === 'real') {
        badge.style.background = 'rgba(34,211,238,0.18)';
        badge.style.borderColor = 'rgba(34,211,238,0.6)';
        badge.style.color = 'var(--accent)';
      } else {
        badge.style.background = 'rgba(74,222,128,0.12)';
        badge.style.borderColor = 'rgba(74,222,128,0.35)';
        badge.style.color = '#4ade80';
      }
    }

    // 브레이크다운 칩
    const bdEl = document.getElementById('dailyPnlBreakdown');
    if (bdEl) bdEl.innerHTML = '';

    // 일별 손익 테이블
    const rawDaily = data.recent_daily || data.dailyPnl || [];
    const dailyPnl = rawDaily.map(d => ({
      date: d.date || d.sell_date,
      stocks: d.stocks ?? d.n_trades,
      buyTotal: d.buyTotal ?? d.buy_total,
      pnl: d.pnl,
      avgPct: d.avgPct ?? d.avg_pct,
      n_stopped: d.n_stopped,
    }));
    const totalPnl = data.total_pnl ?? data.totalPnl ?? 0;
    const pnlBody = document.getElementById('pnlTable');
    if (dailyPnl.length === 0) {
      pnlBody.innerHTML = '<tr><td colspan="6" style="padding:20px;text-align:center;color:var(--dim);font-size:12px;">아직 거래 내역 없음 — 평일 14:50 매수 → T+1 09:01 매도 사이클 대기</td></tr>';
      return;
    }

    // 누적 손익 (최신순 역순 누적)
    let cumPnl = totalPnl;
    const cumPnls = [];
    for (let i = 0; i < dailyPnl.length; i++) {
      cumPnls.push(cumPnl);
      cumPnl -= dailyPnl[i].pnl || 0;
    }

    pnlBody.innerHTML = dailyPnl.map((p, i) => {
      const cum = cumPnls[i];
      const dayPct = p.avgPct != null
        ? Number(p.avgPct).toFixed(2)
        : (p.buyTotal ? (p.pnl / p.buyTotal * 100).toFixed(2) : '-');
      const stoppedBadge = p.n_stopped
        ? `<span class="badge badge-stopLoss" style="margin-left:6px;">손절 ${p.n_stopped}</span>`
        : '';
      return `
      <tr class="pnl-row" data-date="${p.date}" onclick="toggleDailyDetail(this, '${p.date}')">
        <td>${p.date}</td>
        <td class="num">${p.stocks ?? '-'}${stoppedBadge}</td>
        <td class="num" style="font-size:11px;">${p.buyTotal ? Math.round(p.buyTotal).toLocaleString() + '원' : '-'}</td>
        <td class="num ${p.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${p.pnl > 0 ? '+' : ''}${Math.round(p.pnl || 0).toLocaleString()}원</td>
        <td class="num ${p.pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}" style="font-size:11px;">${p.pnl > 0 && dayPct !== '-' ? '+' : ''}${dayPct}${dayPct !== '-' ? '%' : ''}</td>
        <td class="num ${cum >= 0 ? 'pnl-pos' : 'pnl-neg'}" style="font-size:11px;">${cum > 0 ? '+' : ''}${Math.round(cum).toLocaleString()}원</td>
      </tr>`;
    }).join('');

    // 이전에 펼쳐진 상세 복원
    if (_openDetailDate) {
      const openRow = pnlBody.querySelector(`tr[data-date="${_openDetailDate}"]`);
      if (openRow) toggleDailyDetail(openRow, _openDetailDate);
    }
  }

  // ── 일별 상세 토글 ─────────────────────────────────
  async function toggleDailyDetail(row, date) {
    const next = row.nextElementSibling;
    if (next && next.classList.contains('daily-detail-row')) {
      next.remove();
      _openDetailDate = null;
      return;
    }
    document.querySelectorAll('.daily-detail-row').forEach(el => el.remove());

    const trades = await api(`/api/trades?date=${date}`);
    if (!trades || trades.length === 0) return;

    const sells = trades.map(t => {
      const buyPrice = t.buy_price ?? t.buyPrice ?? 0;
      const sellPrice = t.sell_price ?? t.sellPrice ?? 0;
      const qty = t.qty || 0;
      const pnlVal = t.pnl || 0;
      const buyAmt = buyPrice * qty;
      const pnlPct = buyAmt > 0 ? (pnlVal / buyAmt * 100) : 0;
      const exitReason = t.exit_reason ?? t.exitReason ?? '';
      let phase = 'overnight';
      if (exitReason === 'stop_loss') phase = 'stopLoss';
      else if (exitReason && exitReason.startsWith('manual_')) phase = 'manualSell';
      return { ...t, buyPrice, sellPrice, qty, pnl: pnlVal, pnlPct, phase };
    });
    if (sells.length === 0) return;

    const todayStr = (() => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    })();
    const isToday = date === todayStr;
    const scanMap = {};
    if (isToday) for (const s of _cachedScanLog) scanMap[s.code] = s;

    const thStyle = 'padding:6px 10px;font-size:10px;color:var(--dim);border-bottom:1px solid var(--border);font-weight:600;';
    const tdStyle = "padding:5px 10px;font-size:11.5px;font-family:'SF Mono',monospace;";
    let html = '<td colspan="6"><div style="padding:10px 14px;background:rgba(0,0,0,0.25);border-radius:8px;">';
    html += '<table style="width:100%;border-collapse:collapse;">';
    html += `<thead><tr style="background:rgba(0,0,0,0.3);">
      <th style="${thStyle}text-align:left;">종목</th>
      <th style="${thStyle}text-align:left;">구분</th>
      <th style="${thStyle}text-align:right;">수량</th>
      <th style="${thStyle}text-align:right;">매수가</th>
      <th style="${thStyle}text-align:right;">매수금액</th>
      <th style="${thStyle}text-align:right;">매도가</th>
      <th style="${thStyle}text-align:right;">매도금액</th>
      <th style="${thStyle}text-align:right;">등락률</th>
      <th style="${thStyle}text-align:right;">손익</th>
      <th style="${thStyle}text-align:right;">수익률</th>
    </tr></thead><tbody>`;

    let totQty = 0, totBuy = 0, totSell = 0, totPnl = 0;
    for (const s of sells) {
      const isStopLoss = s.phase === 'stopLoss';
      const isManual = s.phase === 'manualSell';
      const badge = isStopLoss
        ? '<span class="badge badge-stopLoss">손절</span>'
        : isManual
          ? '<span class="badge badge-manual">수동매도</span>'
          : '<span class="badge badge-overnight">T+1 시가매도</span>';
      const qty = s.qty || 0;
      const buyAmt = Math.round((s.buyPrice || 0) * qty);
      const sellAmt = Math.round((s.sellPrice || 0) * qty);
      const pnl = s.pnl || 0;
      const pct = s.pnlPct || 0;
      const liveScan = isToday ? scanMap[s.code] : null;
      const chgRate = (liveScan && liveScan.prevClose > 0)
        ? ((liveScan.close - liveScan.prevClose) / liveScan.prevClose) * 100
        : null;
      totQty += qty; totBuy += buyAmt; totSell += sellAmt; totPnl += pnl;
      const pnlCls = pnl > 0 ? 'pnl-pos' : pnl < 0 ? 'pnl-neg' : 'dim';
      const pctCls = pct > 0 ? 'pnl-pos' : pct < 0 ? 'pnl-neg' : 'dim';
      const chgCls = chgRate == null ? 'dim' : chgRate > 0 ? 'pnl-pos' : chgRate < 0 ? 'pnl-neg' : 'dim';
      const chgText = chgRate == null ? '-' : `${chgRate > 0 ? '+' : ''}${chgRate.toFixed(1)}%`;
      html += `<tr>
        <td style="${tdStyle}">
          <span class="stock-link" data-code="${s.code}" data-name="${s.name || s.code}"
            style="cursor:pointer;border-bottom:1px dashed var(--dim);">${s.name || s.code}</span>
        </td>
        <td style="${tdStyle}">${badge}</td>
        <td style="${tdStyle}text-align:right;">${qty.toLocaleString()}</td>
        <td style="${tdStyle}text-align:right;color:var(--dim);">${Math.round(s.buyPrice || 0).toLocaleString()}<small style="font-size:10px;font-weight:500;margin-left:2px;">원</small><small style="font-size:10px;font-weight:400;margin-left:3px;">(${fmtTradeMD(s.buy_date)})</small></td>
        <td style="${tdStyle}text-align:right;color:var(--dim);">${buyAmt.toLocaleString()}</td>
        <td style="${tdStyle}text-align:right;">${Math.round(s.sellPrice || 0).toLocaleString()}<small style="font-size:10px;color:var(--dim);font-weight:500;margin-left:2px;">원</small><small style="font-size:10px;color:var(--dim);font-weight:400;margin-left:3px;">(${fmtTradeMD(s.sell_date)})</small></td>
        <td style="${tdStyle}text-align:right;">${sellAmt.toLocaleString()}</td>
        <td style="${tdStyle}text-align:right;" class="${chgCls}">${chgText}</td>
        <td style="${tdStyle}text-align:right;" class="${pnlCls}">${pnl > 0 ? '+' : ''}${Math.round(pnl).toLocaleString()}원</td>
        <td style="${tdStyle}text-align:right;" class="${pctCls}">${pct > 0 ? '+' : ''}${pct.toFixed(2)}%</td>
      </tr>`;
    }

    if (sells.length > 1) {
      const totPnlCls = totPnl > 0 ? 'pnl-pos' : totPnl < 0 ? 'pnl-neg' : 'dim';
      html += `<tr style="border-top:2px solid var(--border);font-weight:700;">
        <td style="${tdStyle}color:var(--dim);">합계</td>
        <td></td>
        <td style="${tdStyle}text-align:right;">${totQty.toLocaleString()}</td>
        <td></td>
        <td style="${tdStyle}text-align:right;color:var(--dim);">${totBuy.toLocaleString()}</td>
        <td></td>
        <td style="${tdStyle}text-align:right;">${totSell.toLocaleString()}</td>
        <td></td>
        <td style="${tdStyle}text-align:right;" class="${totPnlCls}">${totPnl > 0 ? '+' : ''}${Math.round(totPnl).toLocaleString()}원</td>
        <td></td>
      </tr>`;
    }

    html += '</tbody></table></div></td>';
    const detailRow = document.createElement('tr');
    detailRow.className = 'daily-detail-row';
    detailRow.innerHTML = html;
    row.after(detailRow);
    _openDetailDate = date;
  }

  // ── 종목명 클릭 → 토스증권 ────────────────────────
  document.addEventListener('click', (e) => {
    const link = e.target.closest('.stock-link');
    if (!link) return;
    const code = link.dataset.code;
    if (code) window.open(`https://www.tossinvest.com/stocks/A${code}/order`, '_blank');
  });

  // ── 자동 새로고침 ─────────────────────────────────
  refreshDailyPnl();
  setInterval(refreshDailyPnl, 30000);
</script>

</body>
</html>
